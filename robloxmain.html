<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robux Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background-image: url("robloxbackground.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:95%;
    max-width:1100px;
    text-align:center;
}

h1{
    color:white;
    margin-bottom:40px;
    font-size:45px;
}

.cards{
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    width:280px;
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.icon{
    font-size:60px;
}

.card h2{
    margin:20px 0;
    color:#222;
}

.price{
    font-size:42px;
    color:#00a651;
    font-weight:bold;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:#00a651;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#007c3d;
}

.more{
    margin-top:45px;
}

.more button{
    width:220px;
    background:#222;
}

.more button:hover{
    background:#444;
}

/* Popup */
.popup{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-content{
    background:#fff;
    padding:30px;
    border-radius:15px;
    width:340px;
    text-align:center;
}

.close{
    float:right;
    font-size:28px;
    cursor:pointer;
    font-weight:bold;
}

.crypto-btn{
    display:block;
    width:100%;
    margin:12px 0;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#00a651;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.crypto-btn:hover{
    background:#007c3d;
}
</style>
<script>
function openCrypto(){
    document.getElementById("cryptoPopup").style.display="flex";
}

function closeCrypto(){
    document.getElementById("cryptoPopup").style.display="none";
}


    // Later, replace this with your checkout page.
    // Example:
    // window.location.href = "btc-payment.html";

</script>


<!-- Crypto Payment Popup -->
<div id="cryptoPopup" class="popup">
    <div class="popup-content">
        <span class="close" onclick="closeCrypto()">&times;</span>

        <h2>Select Cryptocurrency</h2>
        
        <button class="crypto-btn" onclick="selectCrypto('Litecoin (LTC)')">
            Ł Litecoin (LTC)
        </button>
        <button class="crypto-btn" onclick="selectCrypto('USDT (TRC20)')">
            💲 USDT (TRC20)
        </button>
    </div>
</div>
<body>

<div class="container">

<h1>Robux Shop</h1>

<div class="cards">

<div class="card">
<h2>Popular Pack</h2>
<h3>[8500+]</h3>
<div class="price">$0.49</div>
<button onclick="openCrypto()">Purchase</button>
</div>

<div class="card">
<h2>Elite Pack</h2>
<h3>[1500+]</h3>
<div class="price">$0.99</div>
<button onclick="openCrypto()">Purchase</button>
</div>

<div class="card">
<h2>Premium Pack</h2>
<h3>[1000+]</h3>
<div class="price">$1.99</div>
<button onclick="openCrypto()">Purchase</button>
</div>

</div>

</div>

</body>
</html>
